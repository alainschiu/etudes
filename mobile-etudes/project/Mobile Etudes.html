<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Études — Mobile</title>
<link rel="stylesheet" href="etudes-tokens.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #07060A;
    min-height: 100vh;
    font-family: var(--font-sans);
    color: var(--ivory-100);
  }
  #root { min-height: 100vh; }
  /* Hide scrollbars on the phone screen */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  /* Pulse for active session indicator */
  @keyframes etudes-pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .pulse { animation: etudes-pulse 1.6s ease-in-out infinite; }

  /* Slide drawer */
  @keyframes etudes-slide-in { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes etudes-slide-out { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  @keyframes etudes-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes etudes-fade-out { from { opacity: 1; } to { opacity: 0; } }
  @keyframes etudes-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes etudes-rise-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Metronome beat */
  @keyframes metro-beat {
    0% { transform: scaleY(1); opacity: 0.4; }
    8% { transform: scaleY(1.6); opacity: 1; }
    100% { transform: scaleY(1); opacity: 0.4; }
  }

  /* Tap target */
  button { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/atoms.jsx"></script>

<script type="text/babel" src="src/screens-piece.jsx"></script>

</body>
</html>
